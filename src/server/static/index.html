<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>kobito_agents</title>
<link rel="stylesheet" href="/style.css?v=3">
</head>
<body>

<div class="layout">

  <!-- 左ペイン: エージェント一覧 -->
  <div class="sidebar">
    <div class="sidebar-header">kobito_agents</div>
    <div class="sidebar-section-label">エージェント <button class="add-agent-btn" id="add-agent-btn" title="エージェント追加">＋</button></div>
    <div class="agent-list" id="agent-list"></div>
    <div class="sidebar-footer">
      <div class="process-debug" id="process-debug"></div>
      <button class="restart-btn" id="restart-btn">&#x21bb; サーバー再起動</button>
      <button class="scheduler-toggle-btn" id="scheduler-toggle-btn">
        <span class="scheduler-indicator off" id="scheduler-indicator"></span>
        スケジューラー <span id="scheduler-label">OFF</span>
      </button>
      <button class="scheduler-log-btn" id="scheduler-log-btn">スケジューラーログ</button>
    </div>
  </div>

  <!-- 中央ペイン: タブ + コンテンツ -->
  <div class="middle-pane" id="middle-pane" style="position:relative;">
    <div class="tabs">
      <button class="sidebar-toggle" id="sidebar-toggle" title="エージェント一覧">☰</button>
      <div class="tab active" data-tab="chat">セッション</div>
      <div class="tab" data-tab="tasks">タスク</div>
      <div class="tab" data-tab="reports">ファイル</div>
      <div class="tab" data-tab="settings">設定</div>
    </div>

    <!-- 会話タブ -->
    <div id="chat-tab-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="new-chat-btn" id="new-chat-btn">+ 新規会話</div>
      <div class="conversation-list" id="conversation-list"></div>
    </div>

    <!-- タスクタブ -->
    <div id="tasks-tab-content" style="display:none; flex:1; overflow:hidden; position:relative;">
      <div id="task-list-view" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;">
        <div class="task-list" id="task-list"></div>
      </div>
      <div id="task-detail-pane" class="task-detail-pane" style="position:absolute; inset:0; display:none; flex-direction:column;">
        <div class="task-detail-header" id="task-detail-header"></div>
        <div class="task-detail-body" id="task-detail-body"></div>
      </div>
    </div>

    <!-- レポートタブ -->
    <div id="reports-tab-content" style="display:none; flex:1; overflow:hidden; position:relative;">
      <div id="report-list-view" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding:8px;">
        <div id="report-list"></div>
      </div>
      <div id="report-detail-pane" style="position:absolute; inset:0; display:none; flex-direction:column;">
        <div class="task-detail-header" style="display:flex; align-items:center; gap:8px;">
          <button class="task-back-btn" id="report-back-btn">←</button>
          <span id="report-detail-title" style="font-weight:600; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
        </div>
        <div id="report-detail-body" style="flex:1; overflow-y:auto; padding:16px; font-size:13px; line-height:1.7;"></div>
      </div>
    </div>

    <!-- 設定タブ -->
    <div id="settings-tab-content" class="settings-content">
      <div class="settings-section">
        <label>名前</label>
        <input type="text" class="settings-input" data-field="name">
      </div>
      <div class="settings-section">
        <label>説明</label>
        <input type="text" class="settings-input" data-field="description">
      </div>
      <div class="settings-section">
        <label>モデル</label>
        <select class="settings-input" data-field="model_tier">
          <option value="deep">深い思考（opus）</option>
          <option value="quick">軽い即答（sonnet）</option>
        </select>
      </div>
      <div class="settings-section">
        <label>プロジェクトパス</label>
        <input type="text" class="settings-input" data-field="path" disabled style="opacity: 0.6;">
      </div>
      <div class="settings-section">
        <button class="settings-save-btn" id="settings-save-btn">保存</button>
      </div>
      <div class="settings-section settings-danger-zone" id="danger-zone" style="display:none;">
        <label>危険な操作</label>
        <button class="delete-agent-btn" id="delete-agent-btn">エージェント登録解除</button>
      </div>
    </div>

    <!-- エージェント追加フォーム -->
    <div id="add-agent-pane" style="display:none; position:absolute; inset:0; z-index:10; background:var(--bg-secondary); flex-direction:column;">
      <div class="task-detail-header" style="display:flex; align-items:center; gap:8px;">
        <button class="task-back-btn" id="add-agent-cancel-btn">←</button>
        <span style="font-weight:600; font-size:14px; flex:1;">エージェント追加</span>
      </div>
      <div style="flex:1; overflow-y:auto; padding:16px;">
        <div class="settings-section">
          <label>名前 <span style="color:var(--danger);">*</span></label>
          <input type="text" class="settings-input" id="add-agent-name" placeholder="例: キャスパー">
        </div>
        <div class="settings-section">
          <label>プロジェクトパス <span style="color:var(--danger);">*</span></label>
          <input type="text" class="settings-input" id="add-agent-path" placeholder="例: D:/AI/code/my_project">
        </div>
        <div class="settings-section">
          <label>説明</label>
          <input type="text" class="settings-input" id="add-agent-description" placeholder="例: ゲームデザイナー">
        </div>
        <div class="settings-section">
          <label>CLI</label>
          <select class="settings-input" id="add-agent-cli">
            <option value="claude">claude</option>
            <option value="codex">codex</option>
          </select>
        </div>
        <div class="settings-section">
          <label>モデル</label>
          <select class="settings-input" id="add-agent-model-tier">
            <option value="deep">深い思考（opus）</option>
            <option value="quick">軽い即答（sonnet）</option>
          </select>
        </div>
        <div class="settings-section" style="display:flex; gap:8px;">
          <button class="settings-save-btn" id="add-agent-submit-btn">登録</button>
          <button class="task-back-btn" id="add-agent-cancel-btn2">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- スケジューラーログパネル -->
    <div id="scheduler-log-pane" style="display:none; position:absolute; inset:0; z-index:10; background:var(--bg-secondary); flex-direction:column;">
      <div class="task-detail-header" style="display:flex; align-items:center; gap:8px;">
        <button class="task-back-btn" id="scheduler-log-back-btn">←</button>
        <span style="font-weight:600; font-size:14px; flex:1;">スケジューラーログ</span>
        <button class="task-back-btn" id="scheduler-log-refresh-btn">↻</button>
      </div>
      <div id="scheduler-log-list" style="flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <!-- リサイズハンドル -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- 右ペイン: チャット画面 -->
  <div class="chat-pane" id="chat-pane">
    <div class="chat-header">
      <button class="mobile-back-btn" id="mobile-back-btn">←</button>
      <div class="chat-title-group">
        <span class="chat-title" id="chat-title" title="クリックして編集"></span>
        <select class="model-select header-model-select" id="model-select"></select>
      </div>
      <div class="chat-menu-wrapper">
        <button class="chat-menu-btn" id="chat-menu-btn">⋮</button>
        <div class="chat-menu" id="chat-menu">
          <div class="chat-menu-item" id="btn-edit-title">タイトル編集</div>
          <div class="chat-menu-item" id="btn-cli">CLIで開く</div>
          <div class="chat-menu-divider"></div>
          <div class="chat-menu-item chat-menu-danger" id="btn-hide">非表示にする</div>
          <div class="chat-menu-item chat-menu-danger" id="btn-delete-session">完全削除</div>
        </div>
      </div>
    </div>
    <div id="chat-messages-host"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">送信</button>
        <button class="stop-btn" id="stop-btn" style="display:none;">中断</button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter で送信 / Shift+Enter で改行</span>
      </div>
    </div>
  </div>

  <!-- 右ペイン: 設定画面 -->
  <div class="settings-pane" id="settings-pane">
    <div class="settings-pane-header">
      <button class="mobile-back-btn" id="settings-back-btn">←</button>
      <span id="settings-pane-header"></span>
    </div>
    <div class="settings-pane-body">
      <div class="settings-field">
        <label>CLAUDE.md</label>
        <textarea data-field="system-prompt"></textarea>
      </div>
    </div>
    <div class="settings-actions">
      <button class="chat-action-btn" id="btn-reset-prompt">リセット</button>
      <button class="settings-save-btn" id="btn-save-prompt">保存</button>
    </div>
  </div>

</div>

<!-- タスク: コンテキストメニュー -->
<div id="task-context-menu" class="context-menu">
  <div class="context-menu-item" id="ctx-talk">タスクについて話す</div>
  <div class="context-menu-item" id="ctx-work">1ステップ作業する</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item" id="ctx-edit">編集</div>
  <div class="context-menu-item" id="ctx-force-done">強制完了</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item ctx-danger" id="ctx-delete">削除</div>
</div>


<script src="/marked.min.js"></script>
<script src="/app.js?v=3"></script>
</body>
</html>
