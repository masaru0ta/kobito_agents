<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>kobito_agents</title>
<link rel="stylesheet" href="/style.css?v=21">
<link rel="stylesheet" href="/highlight-github-dark.min.css">
</head>
<body>

<div class="layout">

  <!-- 左ペイン: エージェント一覧 -->
  <div class="sidebar">
    <div class="sidebar-header">kobito_agents</div>
    <div class="sidebar-section-label">エージェント <button class="add-agent-btn" id="add-agent-btn" title="エージェント追加">＋</button></div>
    <div class="agent-list" id="agent-list"></div>
    <div class="sidebar-footer">
      <div class="process-debug" id="process-debug"></div>
      <button class="restart-btn" id="restart-btn">&#x21bb; サーバー再起動</button>
      <button class="scheduler-toggle-btn" id="scheduler-toggle-btn">
        <span class="scheduler-indicator off" id="scheduler-indicator"></span>
        自律作業 <span id="scheduler-label">OFF</span>
        <span class="scheduler-next-run" id="scheduler-next-run"></span>
      </button>
      <button class="scheduler-log-btn" id="scheduler-log-btn">自律作業ログ</button>
    </div>
  </div>

  <!-- 中央ペイン: タブ + コンテンツ -->
  <div class="middle-pane" id="middle-pane" style="position:relative;">
    <div class="tabs">
      <button class="sidebar-toggle" id="sidebar-toggle" title="エージェント一覧">☰</button>
      <div class="tab active" data-tab="dashboard">ダッシュボード</div>
      <div class="tab" data-tab="chat">セッション</div>
      <div class="tab" data-tab="tasks">タスク</div>
      <div class="tab" data-tab="reports">ファイル</div>
      <div class="tab" data-tab="settings">⚙</div>
    </div>

    <!-- ダッシュボードタブ -->
    <div id="dashboard-tab-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="dashboard-header">
        <span class="dashboard-header-title" id="dashboard-header-title"></span>
        <button class="dashboard-edit-btn" id="dashboard-edit-btn">編集</button>
      </div>
      <!-- 表示モード -->
      <div id="dashboard-view" class="dashboard-body" style="flex:1; overflow-y:auto; padding:24px 28px;"></div>
      <!-- 編集モード -->
      <div id="dashboard-edit-view" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <textarea class="dashboard-editor" id="dashboard-editor" style="flex:1; width:100%; resize:none; background:var(--bg-primary); border:none; outline:none; color:var(--text-primary); font-family:var(--font-mono,monospace); font-size:13px; line-height:1.7; padding:24px 28px;"></textarea>
        <div class="dashboard-edit-footer">
          <button class="dashboard-cancel-btn" id="dashboard-cancel-btn">キャンセル</button>
          <button class="dashboard-save-btn" id="dashboard-save-btn">保存</button>
        </div>
      </div>
    </div>

    <!-- 会話タブ -->
    <div id="chat-tab-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="new-chat-btn" id="new-chat-btn">+ 新規会話</div>
      <div class="conversation-list" id="conversation-list"></div>
    </div>

    <!-- タスクタブ -->
    <div id="tasks-tab-content" style="display:none; flex:1; overflow:hidden; position:relative;">
      <div id="task-list-view" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;">
        <div class="task-list" id="task-list"></div>
      </div>
      <div id="task-detail-pane" class="task-detail-pane" style="position:absolute; inset:0; display:none; flex-direction:column;">
        <div class="task-detail-header" id="task-detail-header"></div>
        <div class="task-detail-body" id="task-detail-body"></div>
      </div>
    </div>

    <!-- ファイルタブ -->
    <div id="reports-tab-content" style="display:none; flex:1; overflow:hidden; position:relative;">
      <!-- ディレクトリブラウザ -->
      <div id="report-list-view" style="position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; border-bottom:1px solid var(--border); flex-shrink:0;">
          <div class="file-breadcrumb" id="file-breadcrumb" style="border-bottom:none; flex:1;"></div>
          <div style="flex-shrink:0; margin-right:8px; display:flex; align-items:center; gap:0; font-size:11px;">
            <span id="file-sort-name" class="file-sort-tab" data-sort="name">名前順</span>
            <span style="color:var(--text-muted); margin:0 2px;">|</span>
            <span id="file-sort-mtime" class="file-sort-tab active" data-sort="mtime">更新順</span>
          </div>
        </div>
        <div style="flex:1; overflow-y:auto; overflow-x:hidden; padding:6px;" id="file-entry-list"></div>
      </div>
      <!-- ファイル詳細（.md） -->
      <div id="report-detail-pane" style="position:absolute; inset:0; display:none; flex-direction:column;">
        <div class="task-detail-header" style="display:flex; align-items:center; gap:8px; position:relative;">
          <button class="task-back-btn" id="report-back-btn">←</button>
          <span id="report-detail-title" style="font-weight:600; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
          <button id="file-detail-menu-btn" style="background:none; border:none; color:var(--text-secondary); font-size:18px; cursor:pointer; padding:2px 6px; border-radius:4px; line-height:1;">⋮</button>
          <div id="file-detail-menu" class="chat-menu" style="top:36px; right:0; min-width:160px;">
            <div class="chat-menu-item" id="btn-file-talk">ファイルについて話す</div>
          </div>
        </div>
        <div id="file-session-banner" style="display:none; align-items:center; gap:8px; padding:6px 14px; background:var(--bg-tertiary); border-bottom:1px solid var(--border); font-size:12px; flex-shrink:0;">
          <span style="color:var(--text-muted);">会話セッション:</span>
          <a id="file-session-link" class="task-session-link" style="font-size:12px;"></a>
        </div>
        <div id="report-detail-body" style="flex:1; overflow-y:auto; padding:16px; font-size:13px; line-height:1.7;"></div>
      </div>
    </div>

    <!-- 設定タブ -->
    <div id="settings-tab-content" class="settings-content">
      <div class="settings-section settings-thumbnail-section">
        <label>アバター画像</label>
        <div class="settings-thumbnail-wrap">
          <div class="settings-avatar-preview" id="settings-avatar-preview" title="クリックして変更"></div>
          <input type="file" id="thumbnail-input" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none;">
          <button class="settings-thumbnail-remove" id="thumbnail-remove-btn" style="display:none;">削除</button>
        </div>
      </div>
      <div class="settings-section">
        <label>名前</label>
        <input type="text" class="settings-input" data-field="name">
      </div>
      <div class="settings-section">
        <label>説明</label>
        <input type="text" class="settings-input" data-field="description">
      </div>
      <div class="settings-section">
        <label>CLI</label>
        <select class="settings-input" data-field="cli">
          <option value="claude">Claude Code</option>
          <option value="codex">Codex</option>
        </select>
      </div>
      <div class="settings-section">
        <label>モデル</label>
        <select class="settings-input" data-field="model_tier">
          <option value="quick">sonnet（標準）</option>
          <option value="deep">opus（高精度）</option>
        </select>
      </div>
      <div class="settings-section">
        <label>プロジェクトパス</label>
        <input type="text" class="settings-input" data-field="path" disabled style="opacity: 0.6;">
      </div>
      <div class="settings-section">
        <button class="settings-save-btn" id="settings-save-btn">保存</button>
      </div>
      <div class="settings-section settings-claude-md-btn-wrap">
        <button class="settings-save-btn" id="open-claude-md-btn">AI設定 (CLAUDE.md) を編集</button>
      </div>
      <div class="settings-section settings-danger-zone" id="danger-zone" style="display:none;">
        <label>危険な操作</label>
        <button class="delete-agent-btn" id="delete-agent-btn">エージェント登録解除</button>
      </div>
    </div>

    <!-- エージェント追加フォーム -->
    <div id="add-agent-pane" style="display:none; position:absolute; inset:0; z-index:10; background:var(--bg-secondary); flex-direction:column;">
      <div class="task-detail-header" style="display:flex; align-items:center; gap:8px;">
        <button class="task-back-btn" id="add-agent-cancel-btn">←</button>
        <span style="font-weight:600; font-size:14px; flex:1;">エージェント追加</span>
      </div>
      <div style="flex:1; overflow-y:auto; padding:16px;">
        <div class="settings-section">
          <label>種別</label>
          <select class="settings-input" id="add-agent-type">
            <option value="agent">通常エージェント</option>
            <option value="team">チーム</option>
          </select>
        </div>
        <div class="settings-section">
          <label>名前 <span style="color:var(--danger);">*</span></label>
          <input type="text" class="settings-input" id="add-agent-name" placeholder="例: キャスパー">
        </div>
        <div class="settings-section" id="add-agent-path-section">
          <label>プロジェクトパス <span style="color:var(--danger);">*</span></label>
          <input type="text" class="settings-input" id="add-agent-path" placeholder="例: D:/AI/code/my_project">
        </div>
        <div class="settings-section">
          <label>説明</label>
          <input type="text" class="settings-input" id="add-agent-description" placeholder="例: ゲームデザイナー">
        </div>
        <div class="settings-section" id="add-agent-cli-section">
          <label>CLI</label>
          <select class="settings-input" id="add-agent-cli">
            <option value="claude">claude</option>
            <option value="codex">codex</option>
          </select>
        </div>
        <div class="settings-section" id="add-agent-model-section">
          <label>モデル</label>
          <select class="settings-input" id="add-agent-model-tier">
            <option value="quick">sonnet（標準）</option>
            <option value="deep">opus（高精度）</option>
          </select>
        </div>
        <!-- チーム専用: メンバー選択 -->
        <div class="settings-section" id="add-agent-members-section" style="display:none;">
          <label>メンバー <span style="color:var(--danger);">*</span></label>
          <div id="add-agent-members-list" style="display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding:4px 0;"></div>
        </div>
        <div class="settings-section" style="display:flex; gap:8px;">
          <button class="settings-save-btn" id="add-agent-submit-btn">登録</button>
          <button class="task-back-btn" id="add-agent-cancel-btn2">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- スケジューラーログパネル -->
    <div id="scheduler-log-pane" style="display:none; position:absolute; inset:0; z-index:10; background:var(--bg-secondary); flex-direction:column;">
      <div class="task-detail-header" style="display:flex; align-items:center; gap:8px;">
        <button class="task-back-btn" id="scheduler-log-back-btn">←</button>
        <span style="font-weight:600; font-size:14px; flex:1;">自律作業ログ</span>
        <button class="task-back-btn" id="scheduler-log-refresh-btn">↻</button>
      </div>
      <div id="scheduler-log-list" style="flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <!-- リサイズハンドル -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- 右ペイン: チャット画面 -->
  <div class="chat-pane" id="chat-pane">
    <div class="chat-header">
      <button class="mobile-back-btn" id="mobile-back-btn">←</button>
      <div class="chat-title-group">
        <div class="chat-title-row">
          <span class="chat-title" id="chat-title" title="クリックして編集"></span>
          <select class="model-select header-model-select" id="model-select"></select>
        </div>
        <a id="chat-linked-file" style="display:none;" title="ファイルを開く"></a>
      </div>
      <div class="chat-menu-wrapper">
        <button class="chat-menu-btn" id="chat-menu-btn">⋮</button>
        <div class="chat-menu" id="chat-menu">
          <div class="chat-menu-item" id="btn-edit-title">タイトル編集</div>
          <div class="chat-menu-item" id="btn-cli">CLIで開く</div>
          <div class="chat-menu-divider"></div>
          <div class="chat-menu-item chat-menu-danger" id="btn-hide">非表示にする</div>
          <div class="chat-menu-item chat-menu-danger" id="btn-delete-session">完全削除</div>
        </div>
      </div>
    </div>
    <div id="system-prompt-preview-host"></div>
    <div id="chat-messages-host"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">送信</button>
        <button class="stop-btn" id="stop-btn" style="display:none;">中断</button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter で送信 / Shift+Enter で改行</span>
      </div>
    </div>
  </div>

  <!-- 右ペイン: 設定画面 -->
  <div class="settings-pane" id="settings-pane">
    <div class="settings-pane-header">
      <button class="mobile-back-btn" id="settings-back-btn">←</button>
      <span id="settings-pane-header"></span>
    </div>
    <div class="settings-pane-body">
      <div class="settings-field">
        <label id="system-prompt-label">CLAUDE.md</label>
        <textarea data-field="system-prompt"></textarea>
      </div>
    </div>
    <div class="settings-actions">
      <button class="chat-action-btn" id="btn-reset-prompt">リセット</button>
      <button class="settings-save-btn" id="btn-save-prompt">保存</button>
    </div>
  </div>

</div>

<!-- タスク: コンテキストメニュー -->
<div id="task-context-menu" class="context-menu">
  <div class="context-menu-item" id="ctx-talk">タスクについて話す</div>
  <div class="context-menu-item" id="ctx-work">1ステップ作業する</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item" id="ctx-edit">編集</div>
  <div class="context-menu-item" id="ctx-force-done">強制完了</div>
  <div class="context-menu-item" id="ctx-recurring">定期タスク設定</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item ctx-danger" id="ctx-delete">削除</div>
</div>

<!-- 定期タスク設定パネル -->
<div id="recurring-panel" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <span>定期タスク設定</span>
      <button class="modal-close-btn" id="recurring-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="recurring-row">
        <label>繰り返し</label>
        <select id="recurring-interval-select">
          <option value="">なし</option>
          <option value="every_check">毎チェック時</option>
          <option value="hourly">毎時</option>
          <option value="daily">毎日</option>
          <option value="weekly">毎週</option>
          <option value="monthly">毎月</option>
        </select>
      </div>
      <div class="recurring-row" id="recurring-time-row" style="display:none;">
        <label>時刻</label>
        <input type="time" id="recurring-time-input" value="09:00" />
      </div>
      <div class="recurring-row" id="recurring-weekday-row" style="display:none;">
        <label>曜日</label>
        <select id="recurring-weekday-select">
          <option value="monday">月曜</option>
          <option value="tuesday">火曜</option>
          <option value="wednesday">水曜</option>
          <option value="thursday">木曜</option>
          <option value="friday">金曜</option>
          <option value="saturday">土曜</option>
          <option value="sunday">日曜</option>
        </select>
      </div>
      <div class="recurring-row" id="recurring-monthday-row" style="display:none;">
        <label>日付</label>
        <input type="number" id="recurring-monthday-input" min="1" max="31" value="1" />
      </div>
      <div class="recurring-row" id="recurring-enabled-row" style="display:none;">
        <label>有効</label>
        <input type="checkbox" id="recurring-enabled-toggle" checked />
      </div>
    </div>
    <div class="modal-footer">
      <button id="recurring-save-btn" class="btn-primary">保存</button>
      <button id="recurring-clear-btn" class="btn-secondary">解除</button>
    </div>
  </div>
</div>


<script src="/marked.min.js"></script>
<script src="/highlight.min.js"></script>
<script src="/app.js?v=23"></script>
</body>
</html>
