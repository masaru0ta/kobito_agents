<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>kobito_agents</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="layout">

  <!-- 左ペイン: エージェント一覧 -->
  <div class="sidebar">
    <div class="sidebar-header">kobito_agents</div>
    <div class="sidebar-section-label">エージェント</div>
    <div class="agent-list" id="agent-list"></div>
  </div>

  <!-- 中央ペイン: タブ + コンテンツ -->
  <div class="middle-pane" id="middle-pane">
    <div class="tabs">
      <button class="sidebar-toggle" id="sidebar-toggle" title="エージェント一覧">☰</button>
      <div class="tab active" data-tab="chat">セッション</div>
      <div class="tab" data-tab="tasks">タスク<span class="tab-badge" id="pending-badge" style="display:none;"></span></div>
      <div class="tab" data-tab="settings">設定</div>
    </div>

    <!-- 会話タブ -->
    <div id="chat-tab-content">
      <div class="new-chat-btn" id="new-chat-btn">+ 新規会話</div>
      <div class="conversation-list" id="conversation-list"></div>
    </div>

    <!-- タスクタブ -->
    <div id="tasks-tab-content" style="display:none; flex:1; overflow:hidden; position:relative;">
      <div id="task-list-view" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;">
        <div class="task-list" id="task-list"></div>
      </div>
      <div id="task-detail-pane" class="task-detail-pane" style="position:absolute; inset:0; display:none; flex-direction:column;">
        <div class="task-detail-header" id="task-detail-header"></div>
        <div class="task-detail-body" id="task-detail-body"></div>
      </div>
    </div>

    <!-- 設定タブ -->
    <div id="settings-tab-content" class="settings-content">
      <div class="settings-section">
        <label>名前</label>
        <input type="text" class="settings-input" data-field="name">
      </div>
      <div class="settings-section">
        <label>説明</label>
        <input type="text" class="settings-input" data-field="description">
      </div>
      <div class="settings-section">
        <label>モデル</label>
        <select class="settings-input" data-field="model_tier">
          <option value="deep">深い思考（opus）</option>
          <option value="quick">軽い即答（sonnet）</option>
        </select>
      </div>
      <div class="settings-section">
        <label>プロジェクトパス</label>
        <input type="text" class="settings-input" data-field="path" disabled style="opacity: 0.6;">
      </div>
      <div class="settings-section">
        <button class="settings-save-btn" id="settings-save-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- リサイズハンドル -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- 右ペイン: チャット画面 -->
  <div class="chat-pane" id="chat-pane">
    <div class="chat-header">
      <button class="mobile-back-btn" id="mobile-back-btn">←</button>
      <div class="chat-title-group">
        <span class="chat-title" id="chat-title" title="クリックして編集"></span>
        <select class="model-select header-model-select" id="model-select"></select>
      </div>
      <div class="chat-actions">
        <button class="chat-action-btn cli" id="btn-cli">CLI</button>
        <button class="chat-action-btn hide" id="btn-hide">非表示</button>
      </div>
    </div>
    <div id="chat-messages-host"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">送信</button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter で送信 / Shift+Enter で改行</span>
      </div>
    </div>
  </div>

  <!-- 右ペイン: 設定画面 -->
  <div class="settings-pane" id="settings-pane">
    <div class="settings-pane-header">
      <button class="mobile-back-btn" id="settings-back-btn">←</button>
      <span id="settings-pane-header"></span>
    </div>
    <div class="settings-pane-body">
      <div class="settings-field">
        <label>CLAUDE.md</label>
        <textarea data-field="system-prompt"></textarea>
      </div>
    </div>
    <div class="settings-actions">
      <button class="chat-action-btn" id="btn-reset-prompt">リセット</button>
      <button class="settings-save-btn" id="btn-save-prompt">保存</button>
    </div>
  </div>

</div>

<!-- タスク: コンテキストメニュー -->
<div id="task-context-menu" class="context-menu">
  <div class="context-menu-item" id="ctx-talk">タスクについて話す</div>
  <div class="context-menu-item" id="ctx-work">1ステップ作業する</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item" id="ctx-edit">編集</div>
  <div class="context-menu-item" id="ctx-force-done">強制完了</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item ctx-danger" id="ctx-delete">削除</div>
</div>

<!-- タスク: 却下ダイアログ -->
<div id="task-reject-dialog" class="dialog-overlay">
  <div class="dialog-box">
    <h3>タスクを却下</h3>
    <textarea id="reject-reason" placeholder="却下理由を入力（任意）"></textarea>
    <div class="dialog-actions">
      <button class="chat-action-btn" id="reject-cancel">キャンセル</button>
      <button class="dialog-danger-btn" id="reject-confirm">却下する</button>
    </div>
  </div>
</div>

<script src="/marked.min.js"></script>
<script src="/app.js?v=2"></script>
</body>
</html>
